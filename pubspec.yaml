name: Sajhya
description: Sajhya Healthcare Patient Portal - Connect to your health records and exercises.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.0
  cookie_jar: ^4.0.0
  path_provider: ^2.0.0
  mobile_scanner: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.0  # or latest

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"   # path to your icon image (1024x1024 recommended)
  adaptive_icon_background: "#0A6EBD"  # optional, for Android adaptive icon background
  adaptive_icon_foreground: "assets/icon/icon.png"  # optional
